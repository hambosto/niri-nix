name: Update Flake Packages

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-flake-packages:
    name: Update Flake Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run nix-update for niri-unstable
        run: nix run nixpkgs#nix-update -- --flake --version=branch packages.x86_64-linux.niri-unstable

      - name: Run nix-update for xwayland-satellite-unstable
        run: nix run nixpkgs#nix-update -- --flake --version=branch packages.x86_64-linux.xwayland-satellite-unstable

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b nix-update/bump-packages
          git add -A
          git commit -m "nix-update: bump unstable packages"
          git push origin nix-update/bump-packages --force

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --title "nix-update: bump unstable packages" \
            --body "Automated bump of unstable packages via \`nix-update\`." \
            --base main \
            --head nix-update/bump-packages \
            2>&1 || gh pr view nix-update/bump-packages --json url -q .url)
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=/pull/)\d+')
          echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Push niri-unstable to Cachix
        if: steps.changes.outputs.changed == 'true'
        run: nix build -L .#niri-unstable --print-out-paths | cachix push ${{ secrets.CACHIX_CACHE_NAME }}

      - name: Push xwayland-satellite-unstable to Cachix
        if: steps.changes.outputs.changed == 'true'
        run: nix build -L .#xwayland-satellite-unstable --print-out-paths | cachix push ${{ secrets.CACHIX_CACHE_NAME }}

      - name: Auto-merge nix-update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.pr.outputs.pull-request-number }} --squash --delete-branch

name: Cachix

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build and Push to Cachix
        run: |
          nix build .#packages.x86_64-linux.niri-unstable --no-link --print-build-logs
          nix build .#packages.x86_64-linux.xwayland-satellite-unstable --no-link --print-build-logs
